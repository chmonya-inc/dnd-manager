name: DND Manager Api

on:
  push:
    branches: cicd

env:
  RELEASE_NAME: dndmanager-api
  IMAGE_NAME: chmonya777/dndmanager-api
  K8S_NAMESPACE: dndmanager
  DOCKERFILE: dockerfiles/api.Dockerfile

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          file: ${{ env.DOCKERFILE }}
          cache-from: ${{ env.IMAGE_NAME }}:latest
  deploy:
    needs: build
    runs-on: raspberrypi
    steps:
    - name: Apply deployment
      run: |
        helm secrets upgrade $RELEASE_NAME .helm/api \
          --install \
          --set-string image.name=$IMAGE_NAME \
          --set-string image.tag=$GITHUB_SHA \
          -f .helm/values.yaml \
          -f .helm/.encrypted/secrets.yaml \
          -n $K8S_NAMESPACE
    - name: Wait for deploy
      run: kubectl rollout status deployment $RELEASE_NAME -n $K8S_NAMESPACE --timeout=300s
