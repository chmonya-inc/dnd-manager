name: Test build and deploy

on:
  push:
    branches:
      - master

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
    - name: Get latest release
      id: latest_release
      run: |
        TAG=$(gh release view -R ${{ github.repository }} --json tagName --jq '.tagName') && \
        echo version=${TAG#release*v} >> "$GITHUB_OUTPUT"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: manual-approval
      uses: chmonya-inc/dnd-manager/.github/workflows/approve.yml@v1
      with:
        issue-title: "Release ${{ steps.latest_release.outputs.version }}"
        issue-body: "Approve to create new release version ${{ steps.latest_release.outputs.version }}"

    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Bump Version and Push Tag
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: patch
        dry_run: true

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag_version.outputs.new_tag }}
        release_name: Release ${{ steps.tag_version.outputs.new_tag }}
        body: ${{ steps.tag_version.outputs.changelog }}

    - name: Bump version and push tag
      uses: rickstaa/action-create-tag@v1
      with:
        tag: ${{ steps.tag_version.outputs.new_tag }}
        message: ${{ steps.tag_version.outputs.changelog }}
