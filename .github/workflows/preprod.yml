name: Bump tag version and wait for approval to create new release tag

on:
  push:
    branches:
      - master

jobs:
  bump-tag:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
    - name: Generate token
      id: generate_token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}

    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get latest release
      id: latest_release
      run: |
        TAG=$(gh release view -R ${{ github.repository }} --json tagName --jq '.tagName') && \
        echo version=${TAG#v} >> "$GITHUB_OUTPUT"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: bump version
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        custom_tag: ${{ steps.latest_release.outputs.version }}

    - name: Await Manual Approval
      uses: trstringer/manual-approval@v1
      with:
        secret: ${{ steps.generate_token.outputs.token }}
        approvers: dnd-manager-developers
        minimum-approvals: 1
        issue-title: "Release ${{ steps.tag_version.outputs.new_tag }}"
        issue-body: "Approve to create new release version ${{ steps.tag_version.outputs.new_tag }}"

    - name: push tag
      uses: rickstaa/action-create-tag@v1
      with:
        tag: ${{ steps.tag_version.outputs.new_tag }}
        message: ${{ steps.tag_version.outputs.changelog }}
