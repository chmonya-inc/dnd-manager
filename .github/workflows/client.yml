name: Release desktop

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      platform:
        required: true
        type: string
      runs-on:
        required: true
        type: string
        default: ubuntu
      build-number:
        required: true
        type: string
      build-script:
        required: true
        type: string
      build-path:
        required: true
        type: string
      backend-url-android:
        required: true
        type: string
      backend-url-desktop:
        required: true
        type: string
    outputs:
      artifact-id:
        description: "ID of the uploaded MSI artifact"
        value: ${{ jobs.build.outputs.artifact-id }}

jobs:
  build:
    name: ${{ input.platform }}
    runs-on: ${{ input.runs-on }}
    outputs:
      artifact-id: ${{ steps.upload-artifact.outputs.artifact-id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Полная история для работы git-версионирования
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew ${{ inputs.build-script }}
        env:
          APP_BUILD_NUMBER: ${{ inputs.build-number }}
          APP_VERSION_NUMBER: ${{ inputs.version }}
          APPS_SCRIPT_URL_DESKTOP: ${{ inputs.backend-url-desktop }}
          APPS_SCRIPT_URL_ANDROID: ${{ inputs.backend-url-android }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
      - uses: actions/upload-artifact@v7
        id: upload-artifact
        with:
          path: ${{ inputs.build-path }}
          archive: false
          if-no-files-found: error
          retention-days: 3
