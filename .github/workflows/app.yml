name: Release android app

on:
  push:
    branches:
      - 'release/all/v*.*.*'
      - 'release/app/v*.*.*'
    tags:
      - 'release/all/v*.*.*'
      - 'release/app/v*.*.*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Полная история для работы git-версионирования
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Decode Keystore
        run: |
          if [ ! -z "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > debug.keystore
          fi
      - run: chmod +x gradlew
      - run: ./gradlew :app:assembleDebug
        env:
          APP_BUILD_NUMBER: ${{ github.run_number }}
          APP_VERSION_NUMBER: ${{ github.ref_name }}
          APPS_SCRIPT_URL_ANDROID: ${{ secrets.APPS_SCRIPT_URL_ANDROID }}
          APPS_SCRIPT_URL_DESKTOP: ${{ secrets.APPS_SCRIPT_URL_DESKTOP }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: dnd-manager-android
          path: app/build/outputs/apk/debug/*.apk
