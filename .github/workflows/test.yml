name: Test build and deploy

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version:  ${{ steps.latest_release.outputs.release }}"
    steps:
    - name: Get latest release
      id: latest_release
      uses: pozetroninc/github-action-get-latest-release@v0.7.0
      with:
        repository: ${{ github.repository }}

  build-api:
    name: Build api
    uses: chmonya-inc/dnd-manager/.github/workflows/docker.yml@v2
    with:
      image-name: chmonya777/dndmanager-api
      image-tag: ${{ steps.get_version.outputs.version }}-${{ github.run_number }}
      dockerfile-path: dockerfiles/api.Dockerfile
    secrets: inherit

  build-web:
    name: Build web
    uses: chmonya-inc/dnd-manager/.github/workflows/docker.yml@v2
    with:
      image-name: chmonya777/dndmanager-web
      image-tag: ${{ steps.get_version.outputs.version }}-${{ github.run_number }}
      dockerfile-path: dockerfiles/web.Dockerfile
      use-config-secrets: true
    secrets: inherit

  build-desktop:
    name: Build desktop
    permissions:
      contents: write
    uses: chmonya-inc/dnd-manager/.github/workflows/desktop.yml@v2
    with:
      version: ${{ steps.get_version.outputs.version }}
      build-number: ${{ github.run_number }}
    secrets: inherit

  build-app:
    name: Build mobile app
    permissions:
      contents: write
    uses: chmonya-inc/dnd-manager/.github/workflows/android.yml@v2
    with:
      version: ${{ steps.get_version.outputs.version }}
      build-number: ${{ github.run_number }}
    secrets: inherit

  deploy-api:
    needs: [build-api]
    uses: chmonya-inc/dnd-manager/.github/workflows/deploy.yml@v2
    with:
      version: ${{ steps.get_version.outputs.version }}
      image-name: chmonya777/dndmanager-api
      image-tag: ${{ steps.get_version.outputs.version }}-${{ github.run_number }}
      release-name: dndmanager-api
      k8s-namespace: dndmanager-test
      app-name: api
      environment: test
    secrets: inherit

  deploy-web:
    needs: [build-web]
    uses: chmonya-inc/dnd-manager/.github/workflows/deploy.yml@v2
    with:
      version: ${{ steps.get_version.outputs.version }}
      image-name: chmonya777/dndmanager-web
      image-tag: ${{ steps.get_version.outputs.version }}-${{ github.run_number }}
      release-name: dndmanager-web
      k8s-namespace: dndmanager-test
      app-name: web
      environment: test
    secrets: inherit
