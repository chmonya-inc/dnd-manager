name: Build test version and deploy

on:
  push:
    branches:
      - test

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.latest_release.outputs.version }}
    steps:
    - name: Get latest release
      id: latest_release
      run: |
        TAG=$(gh release view -R ${{ github.repository }} --json tagName --jq '.tagName') && \
        echo version=${TAG#v} >> "$GITHUB_OUTPUT"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detekt:
    name: Run detekt
    permissions:
      contents: write
    uses: chmonya-inc/dnd-manager/.github/workflows/gradle.yml@v2
    with:
      runs-on: ubuntu-latest
      build-script: "detekt"
      build-path: "**/build/reports/detekt/*"
      archive: true
      artifact-name: detekt

  test:
    name: Run test
    permissions:
      contents: write
    uses: chmonya-inc/dnd-manager/.github/workflows/gradle.yml@v2
    with:
      runs-on: ubuntu-latest
      build-script: "testDebugUnitTest"
      build-path: "**/build/test-results/testDebugUnitTest/*"
      archive: true
      artifact-name: test

  build-api:
    name: Build api
    needs: [test, detekt, version]
    uses: chmonya-inc/dnd-manager/.github/workflows/docker.yml@v2
    with:
      image-name: chmonya777/dndmanager-api
      image-tag: ${{ needs.version.outputs.version }}-${{ github.run_number }}
      dockerfile-path: dockerfiles/api.Dockerfile
    secrets: inherit

  build-web:
    name: Build web
    needs: [test, detekt, version]
    uses: chmonya-inc/dnd-manager/.github/workflows/docker.yml@v2
    with:
      image-name: chmonya777/dndmanager-web
      image-tag: ${{ needs.version.outputs.version }}-${{ github.run_number }}
      dockerfile-path: dockerfiles/web.Dockerfile
      use-config-secrets: true
    secrets: inherit

  build-desktop:
    name: Build desktop
    needs: [test, detekt, version]
    permissions:
      contents: write
    uses: chmonya-inc/dnd-manager/.github/workflows/gradle.yml@v2
    with:
      runs-on: windows-latest
      build-script: ":desktop:packageMsi"
      build-path: desktop/build/compose/binaries/main/msi/*.msi
      build-envs: |
        {
          "APP_BUILD_NUMBER": "${{ github.run_number }}}",
          "APP_VERSION_NUMBER": "${{ needs.version.outputs.version }}",
          "APPS_SCRIPT_URL_DESKTOP": "${{ vars.APPS_SCRIPT_URL_DESKTOP_TEST }}",
          "APPS_SCRIPT_URL_ANDROID": "${{ vars.APPS_SCRIPT_URL_ANDROID_TEST }}"
        }
    secrets: inherit

  build-app:
    name: Build mobile
    needs: [test, detekt, version]
    permissions:
      contents: write
    uses: chmonya-inc/dnd-manager/.github/workflows/gradle.yml@v2
    with:
      runs-on: ubuntu-latest
      build-script: ":app:assembleDebug"
      build-path: app/build/outputs/apk/debug/*.apk
      build-envs: |
        {
          "APP_BUILD_NUMBER": "${{ github.run_number }}}",
          "APP_VERSION_NUMBER": "${{ needs.version.outputs.version }}",
          "APPS_SCRIPT_URL_DESKTOP": "${{ vars.APPS_SCRIPT_URL_DESKTOP_TEST }}",
          "APPS_SCRIPT_URL_ANDROID": "${{ vars.APPS_SCRIPT_URL_ANDROID_TEST }}"
        }
    secrets: inherit

  deploy-api:
    needs: [build-api, version]
    uses: chmonya-inc/dnd-manager/.github/workflows/deploy.yml@v2
    with:
      version: ${{ needs.version.outputs.version }}
      image-name: chmonya777/dndmanager-api
      image-tag: ${{ needs.version.outputs.version }}-${{ github.run_number }}
      release-name: dndmanager-api
      k8s-namespace: dndmanager-test
      app-name: api
      environment: test
    secrets: inherit

  deploy-web:
    needs: [build-web, version]
    uses: chmonya-inc/dnd-manager/.github/workflows/deploy.yml@v2
    with:
      version: ${{ needs.version.outputs.version }}
      image-name: chmonya777/dndmanager-web
      image-tag: ${{ needs.version.outputs.version }}-${{ github.run_number }}
      release-name: dndmanager-web
      k8s-namespace: dndmanager-test
      app-name: web
      environment: test
    secrets: inherit
