name: Prod release

on:
  push:
    tags:
      - v*.*.*
    branches:
      - master

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
    - name: Get latest release
      id: tag
      run: |
        TAG=${{ github.ref_name }} && \
        echo version=${TAG#v} >> "$GITHUB_OUTPUT"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-api:
    name: Build api
    needs: version
    uses: chmonya-inc/dnd-manager/.github/workflows/docker.yml@v2
    with:
      image-name: chmonya777/dndmanager-api
      image-tag: ${{ needs.version.outputs.version }}
      dockerfile-path: dockerfiles/api.Dockerfile
    secrets: inherit

  build-web:
    name: Build web
    needs: version
    uses: chmonya-inc/dnd-manager/.github/workflows/docker.yml@v2
    with:
      image-name: chmonya777/dndmanager-web
      image-tag: ${{ needs.version.outputs.version }}
      dockerfile-path: dockerfiles/web.Dockerfile
      use-config-secrets: true
    secrets: inherit

  build-desktop:
    name: Build desktop
    needs: version
    permissions:
      contents: write
    uses: chmonya-inc/dnd-manager/.github/workflows/desktop.yml@v2
    with:
      version: ${{ needs.version.outputs.version }}
      build-number: ${{ github.run_number }}
      backend-url-desktop: ${{ vars.APPS_SCRIPT_URL_DESKTOP }}
    secrets: inherit

  build-app:
    name: Build mobile app
    needs: version
    permissions:
      contents: write
    uses: chmonya-inc/dnd-manager/.github/workflows/android.yml@v2
    with:
      version: ${{ needs.version.outputs.version }}
      build-number: ${{ github.run_number }}
      backend-url-desktop: ${{ vars.APPS_SCRIPT_URL_DESKTOP }}
      backend-url-android: ${{ vars.APPS_SCRIPT_URL_ANDROID }}
    secrets: inherit

  deploy-api:
    needs: [build-api, build-web, build-desktop, build-app, version]
    uses: chmonya-inc/dnd-manager/.github/workflows/deploy.yml@v2
    with:
      version: ${{ needs.version.outputs.version }}
      image-name: chmonya777/dndmanager-api
      image-tag: ${{ needs.version.outputs.version }}
      release-name: dndmanager-api
      k8s-namespace: dndmanager
      app-name: api
      environment: prod
    secrets: inherit

  deploy-web:
    needs: [deploy-api, version]
    uses: chmonya-inc/dnd-manager/.github/workflows/deploy.yml@v2
    with:
      version: ${{ needs.version.outputs.version }}
      image-name: chmonya777/dndmanager-web
      image-tag: ${{ needs.version.outputs.version }}
      release-name: dndmanager-web
      k8s-namespace: dndmanager
      app-name: web
      environment: prod
    secrets: inherit

  publish:
    needs: [deploy-web, build-desktop, build-app, version]
    uses: chmonya-inc/dnd-manager/.github/workflows/publish.yml@v2
    permissions:
      contents: write
    with:
      tag: ${{ github.ref_name }}
      artifact-ids: "${{ needs.build-app.outputs.artifact-id }},${{ needs.build-desktop.outputs.artifact-id }}"
    secrets: inherit

  cleanup-on-failure:
    runs-on: ubuntu-latest
    needs: [version, build-api, build-web, build-desktop, build-app, deploy-api, deploy-web, publish]
    if: failure()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Delete failed tag and release
        run: |
          git push origin --delete "${{ github.ref_name }}"
          gh release delete "${{ github.ref_name }}" -y || true
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
