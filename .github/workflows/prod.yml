name: Prod release

on:
  push:
    tags:
      - v*.*.*

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
    - name: Get latest release
      id: tag
      run: |
        TAG=${{ github.ref_name }} && \
        echo version=${TAG#v} >> "$GITHUB_OUTPUT"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detekt:
    name: Run detekt
    permissions:
      contents: write
    uses: chmonya-inc/dnd-manager/.github/workflows/gradle.yml@v2
    with:
      runs-on: ubuntu-latest
      build-script: "detekt"
      build-path: "**/build/reports/detekt/*"
      archive: true

  test:
    name: Run test
    permissions:
      contents: write
    uses: chmonya-inc/dnd-manager/.github/workflows/gradle.yml@v2
    with:
      runs-on: ubuntu-latest
      build-script: "testDebugUnitTest"
      build-path: "**/build/test-results/testDebugUnitTest/*"
      archive: true

  build-api:
    name: Build api
    needs: [test, detekt, version]
    uses: chmonya-inc/dnd-manager/.github/workflows/docker.yml@v2
    with:
      image-name: chmonya777/dndmanager-api
      image-tag: ${{ needs.version.outputs.version }}-${{ github.run_number }}
      dockerfile-path: dockerfiles/api.Dockerfile
    secrets: inherit

  build-web:
    name: Build web
    needs: [test, detekt, version]
    uses: chmonya-inc/dnd-manager/.github/workflows/docker.yml@v2
    with:
      image-name: chmonya777/dndmanager-web
      image-tag: ${{ needs.version.outputs.version }}-${{ github.run_number }}
      dockerfile-path: dockerfiles/web.Dockerfile
      use-config-secrets: true
    secrets: inherit

  build-desktop:
    name: Build desktop
    needs: [test, detekt, version]
    permissions:
      contents: write
    uses: chmonya-inc/dnd-manager/.github/workflows/gradle.yml@v2
    with:
      platform: windows
      runs-on: windows-latest
      build-script: ":desktop:packageReleaseMsi"
      build-path: desktop/build/compose/binaries/main-release/msi/*.msi
      build-envs: |
        {
          "APP_BUILD_NUMBER": "${{ github.run_number }}}",
          "APP_VERSION_NUMBER": "${{ needs.version.outputs.version }}",
          "APPS_SCRIPT_URL_DESKTOP": "${{ vars.APPS_SCRIPT_URL_DESKTOP }}",
          "IMGBB_API_KEY": ${{ secrets.IMGBB_API_KEY }}
        }
    secrets: inherit

  build-app:
    name: Build mobile app
    needs: [test, detekt, version]
    permissions:
      contents: write
    uses: chmonya-inc/dnd-manager/.github/workflows/gradle.yml@v2
    with:
      runs-on: ubuntu-latest
      build-script: ":app:assembleRelease"
      build-path: app/build/outputs/apk/release/*.apk
      build-envs: |
        {
          "APP_BUILD_NUMBER": "${{ github.run_number }}}",
          "APP_VERSION_NUMBER": "${{ needs.version.outputs.version }}",
          "APPS_SCRIPT_URL_ANDROID": "${{ vars.APPS_SCRIPT_URL_ANDROID }}",
          "IMGBB_API_KEY": ${{ secrets.IMGBB_API_KEY }}
        }
    secrets: inherit

  deploy-api:
    needs: [build-api, build-web, build-desktop, build-app, version]
    uses: chmonya-inc/dnd-manager/.github/workflows/deploy.yml@v2
    with:
      version: ${{ needs.version.outputs.version }}-${{ github.run_number }}
      image-name: chmonya777/dndmanager-api
      image-tag: ${{ needs.version.outputs.version }}-${{ github.run_number }}
      release-name: dndmanager-api
      k8s-namespace: dndmanager
      app-name: api
      environment: prod
    secrets: inherit

  deploy-web:
    needs: [deploy-api, version]
    uses: chmonya-inc/dnd-manager/.github/workflows/deploy.yml@v2
    with:
      version: ${{ needs.version.outputs.version }}-${{ github.run_number }}
      image-name: chmonya777/dndmanager-web
      image-tag: ${{ needs.version.outputs.version }}-${{ github.run_number }}
      release-name: dndmanager-web
      k8s-namespace: dndmanager
      app-name: web
      environment: prod
    secrets: inherit

  publish:
    needs: [deploy-web, build-desktop, build-app, version]
    uses: chmonya-inc/dnd-manager/.github/workflows/publish.yml@v2
    permissions:
      contents: write
    with:
      tag: ${{ github.ref_name }}
      version: ${{ needs.version.outputs.version }}
      artifact-ids: "${{ needs.build-app.outputs.artifact-id }},${{ needs.build-desktop.outputs.artifact-id }}"
    secrets: inherit

  cleanup-on-failure:
    runs-on: ubuntu-latest
    needs: [version, build-api, build-web, build-desktop, build-app, deploy-api, deploy-web, publish]
    if: always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Delete failed tag and release
        run: |
          git push origin --delete "${{ github.ref_name }}"
          gh release delete "${{ github.ref_name }}" -y || true
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}

  auto-rollback-api:
    needs: [deploy-web, publish]
    if: always() && contains(needs.*.result, 'failure')
    uses: chmonya-inc/dnd-manager/.github/workflows/rollback.yml@v2
    with:
      release-name: dndmanager-api
      k8s-namespace: dndmanager

  auto-rollback-web:
    needs: [publish]
    if: always() && contains(needs.*.result, 'failure')
    uses: chmonya-inc/dnd-manager/.github/workflows/rollback.yml@v2
    with:
      release-name: dndmanager-web
      k8s-namespace: dndmanager
