name: DND Manager Desktop

on:
  push

jobs:
  manual-approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    if: success() # Only proceed if terraform-plan job succeeds

    permissions:
      issues: write

    steps:
      - name: Await Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: dnd-manager-developers
          minimum-approvals: 1
          issue-title: "Manual Approval Required for build"
          issue-body: "Please approve or deny the build"

  build-linux:
    runs-on: ubuntu-latest
    needs: manual-approval
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x gradlew
      - run: ./gradlew :desktop:run
      - uses: actions/upload-artifact@v4
        with:
          name: dnd-manager-linux
          path: desktop/build/install/desktop

  build-windows:
    runs-on: windows-latest
    needs: manual-approval
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x gradlew
      - run: ./gradlew :desktop:run
      - uses: actions/upload-artifact@v4
        with:
          name: dnd-manager-windows
          path: desktop/build/install/desktop
