name: Release desktop

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      build-number:
        required: true
        type: string
      backend-url-desktop:
        required: true
        type: string
    outputs:
      artifact-id:
        description: "ID of the uploaded MSI artifact"
        value: ${{ jobs.build-windows.outputs.artifact-id }}

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload-artifact.outputs.artifact-id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Полная история для работы git-версионирования
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew :desktop:packageDistributionForCurrentOS
        env:
          APP_BUILD_NUMBER: ${{ inputs.build-number }}
          APP_VERSION_NUMBER: ${{ inputs.version }}
          APPS_SCRIPT_URL_DESKTOP: ${{ inputs.backend-url-desktop }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
      - uses: actions/upload-artifact@v7
        id: upload-artifact
        with:
          path: desktop/build/compose/binaries/main/msi/*.msi
          archive: false
          if-no-files-found: error
