name: Build docker image and deploy to k8s

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      dockerfile-path:
        required: true
        type: string
      release-name:
        required: true
        type: string
      k8s-namespace:
        required: true
        type: string
      app-name:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ inputs.image-name }}:${{ github.sha }}
          file: ${{ inputs.dockerfile-path }}
          cache-from: type=registry,ref=${{ inputs.image-name }}:buildcache
          cache-to: type=registry,ref=${{ inputs.image-name }}:buildcache,mode=max
          platforms: linux/arm64

  deploy:
    needs: build
    runs-on: raspberrypi
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Apply deployment
      run: |
        helm secrets upgrade ${{ inputs.release-name }} .helm/${{ inputs.app-name }} \
          --install \
          --set-string image.name=${{ inputs.image-name }} \
          --set-string image.tag=$GITHUB_SHA \
          -f .helm/${{ inputs.app-name }}/values.yaml \
          -f .helm/.encrypted/secrets.yaml \
          -n ${{ inputs.k8s-namespace }}
    - name: Wait for deploy
      run: kubectl rollout status deployment ${{ inputs.release-name }} -n ${{ inputs.k8s-namespace }} --timeout=300s
