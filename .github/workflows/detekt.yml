name: Detekt

on:
  push:
    branches:
      - develop
      - preprod
      - main
  pull_request:

jobs:
  detekt:
    name: Run Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Run detekt
        run: ./gradlew detekt --build-cache
