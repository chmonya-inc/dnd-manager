name: Build mobile app

on:
  workflow_call:
    inputs:
      build-number:
        required: true
        type: string
      version:
        required: true
        type: string
      backend-url-android:
        required: true
        type: string
      backend-url-desktop:
        required: true
        type: string

jobs:
  build-android:
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload-artifact.outputs.artifact-id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Полная история для работы git-версионирования
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Decode Keystore
        run: |
          if [ ! -z "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > debug.keystore
          fi
      - run: chmod +x gradlew
      - run: ./gradlew :app:assembleDebug
        env:
          APP_BUILD_NUMBER: ${{ github.run_number }}
          APP_VERSION_NUMBER: ${{ inputs.version }}
          APPS_SCRIPT_URL_ANDROID: ${{ inputs.backend-url-android }}
          APPS_SCRIPT_URL_DESKTOP: ${{ inputs.backend-url-desktop }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
      - uses: actions/upload-artifact@v7
        id: upload-artifact
        with:
          path: app/build/outputs/apk/debug/*.apk
          archive: false
          if-no-files-found: error
